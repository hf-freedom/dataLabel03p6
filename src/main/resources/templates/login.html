<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - 数据标注管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 400px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .login-type-btn {
            width: 48%;
            margin-bottom: 20px;
        }
        .login-type-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 16px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }
        .error-msg {
            color: red;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>数据标注管理系统</h2>
        <div class="text-center">
            <button type="button" class="btn btn-default login-type-btn active" id="adminBtn" onclick="switchLoginType('admin')">管理员登录</button>
            <button type="button" class="btn btn-default login-type-btn" id="userBtn" onclick="switchLoginType('user')">普通用户登录</button>
        </div>
        <form id="loginForm">
            <input type="hidden" id="loginType" name="loginType" value="admin">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">登 录</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <script>
        function switchLoginType(type) {
            $('#loginType').val(type);
            if (type === 'admin') {
                $('#adminBtn').addClass('active');
                $('#userBtn').removeClass('active');
            } else {
                $('#userBtn').addClass('active');
                $('#adminBtn').removeClass('active');
            }
        }
        
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            var formData = $(this).serialize();
            $.ajax({
                url: '/login',
                type: 'POST',
                data: formData,
                success: function(res) {
                    if (res.code === 200) {
                        window.location.href = '/main';
                    } else {
                        $('#errorMsg').text(res.message).show();
                    }
                },
                error: function() {
                    $('#errorMsg').text('登录失败，请稍后重试').show();
                }
            });
        });
    </script>
</body>
</html>
